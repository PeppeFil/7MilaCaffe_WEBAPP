{% extends "base.html" %}
{% block title %}Cassa | 7MilaCaffe{% endblock %}
{% block content %}
<section class="page-header cash-header">
  <h2>Cassa</h2>
  <p>Seleziona un prodotto. Ogni tocco lo aggiunge al carrello.</p>
</section>

<div class="row g-3 cash-layout">
  <div class="col-xl-8">
    <div class="panel-card cash-products-panel">
      <div class="cash-filters mb-3">
        <label class="visually-hidden" for="searchInput">Cerca prodotto</label>
        <input id="searchInput" type="search" class="form-control form-control-lg" placeholder="Cerca un prodotto o leggi il barcode">
        <label class="visually-hidden" for="categoriaFilter">Categoria</label>
        <select id="categoriaFilter" class="form-select form-select-lg">
          <option value="">Tutti i prodotti</option>
          {% for categoria in categorie %}
            <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div id="productGrid" class="product-grid" aria-live="polite"></div>
    </div>
  </div>

  <div class="col-xl-4">
    <div class="panel-card cart-panel">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0">Carrello</h5>
        <span id="cartItemCount" class="badge rounded-pill text-bg-light">0 prodotti</span>
      </div>
      <p id="emptyCartMsg" class="text-muted mb-3">Tocca un prodotto per iniziare.</p>
      <div id="cartBody" class="cart-lines"></div>

      <form method="post" action="{{ url_for('cash.checkout') }}" id="checkoutForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="cart_payload" id="cartPayload">
        <input type="hidden" id="metodoPagamento" value="contanti">

        <div class="cart-total mt-3">
          <span>Totale</span>
          <strong id="totaleNettoView">€0,00</strong>
        </div>

        <div class="payment-buttons mt-3" role="group" aria-label="Metodo di pagamento">
          <button type="button" class="payment-choice active" data-payment="contanti">Contanti</button>
          <button type="button" class="payment-choice" data-payment="carta">Carta</button>
        </div>

        <details class="cash-options mt-3">
          <summary>Opzioni vendita</summary>
          <div class="row g-2 mt-1">
            <div class="col-6">
              <label class="form-label" for="scontoTipo">Sconto</label>
              <select id="scontoTipo" class="form-select">
                <option value="nessuno">Nessuno</option>
                <option value="percentuale">Percentuale</option>
                <option value="fisso">Importo fisso</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label" for="scontoValore">Valore</label>
              <input type="number" min="0" step="0.01" id="scontoValore" class="form-control" value="0">
            </div>
            <div class="col-12">
              <label class="form-label" for="customerId">Cliente</label>
              <select id="customerId" class="form-select">
                <option value="">Cliente generico</option>
                {% for cliente in clienti %}
                  <option value="{{ cliente.id }}">{{ cliente.display_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label" for="vatRateId">Aliquota IVA</label>
              <select id="vatRateId" class="form-select">
                <option value="">Nessuna</option>
                {% for iva in aliquote_iva %}
                  <option value="{{ iva.id }}" {% if iva.predefinita %}selected{% endif %}>{{ iva.nome }} ({{ "%.2f"|format(iva.aliquota) }}%)</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label" for="noteCliente">Note</label>
              <input type="text" id="noteCliente" class="form-control" placeholder="Facoltative">
            </div>
          </div>
        </details>

        <button type="submit" class="btn btn-coffee btn-lg w-100 mt-3">Completa vendita</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const initialProducts = {{ prodotti_json | tojson }};
</script>
<script src="{{ url_for('static', filename='js/cassa.js') }}"></script>
{% endblock %}
