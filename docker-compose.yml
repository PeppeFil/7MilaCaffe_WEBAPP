services:
  app:
    image: ${APP_IMAGE:-7milacaffe:local}
    build:
      context: .
    env_file:
      - .env
    environment:
      FLASK_CONFIG: production
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.7milacaffe.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.7milacaffe.entrypoints=websecure"
      - "traefik.http.routers.7milacaffe.tls=true"
      - "traefik.http.routers.7milacaffe.tls.certresolver=letsencrypt"
      - "traefik.http.services.7milacaffe.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    command: --label-enable --interval 60 --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
