services:
  app:
    image: ${APP_IMAGE:-7milacaffe:local}
    build:
      context: .
    env_file:
      - .env
    environment:
      FLASK_CONFIG: production
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2.10.2-alpine
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
