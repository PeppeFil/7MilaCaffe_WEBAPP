name: Test, publish and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_IMAGE: ghcr.io/peppefil/7milacaffe-webapp

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}

  deploy:
    needs: publish
    if: ${{ secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_PRIVATE_KEY != '' && secrets.VPS_SSH_KNOWN_HOSTS != '' && secrets.VPS_APP_ENV != '' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Apply migrations and restart the application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_ENV: ${{ secrets.VPS_APP_ENV }}
        run: |
          printf '%s\n' "$VPS_APP_ENV" > .deploy.env
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" 'mkdir -p 7milacaffe'
          scp -P "$VPS_PORT" docker-compose.yml Caddyfile "$VPS_USER@$VPS_HOST:7milacaffe/"
          scp -P "$VPS_PORT" .deploy.env "$VPS_USER@$VPS_HOST:7milacaffe/.env"
          rm .deploy.env
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" '
            set -eu
            cd ~/7milacaffe
            docker compose pull app
            docker compose run --rm app flask --app run:app db upgrade
            docker compose run --rm app flask --app run:app create-admin
            docker compose up -d --remove-orphans
            docker image prune -f
          '
